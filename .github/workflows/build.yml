name: Build Unsigned IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Xcode Project
        run: |
          mkdir -p AppHTML/Payload/AppHTML.app
          cp index.html AppHTML/Payload/AppHTML.app/www/index.html || cp index.html AppHTML/Payload/AppHTML.app/index.html
          
          # Tạo cấu hình tối thiểu cho app iOS hiển thị web
          cat << 'EOF' > AppHTML/Payload/AppHTML.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://apple.com">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>AppHTML</string>
              <key>CFBundleIdentifier</key>
              <string>com.htmlapp.vinhvien</string>
              <key>CFBundleName</key>
              <string>AppHTML</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          # Đóng gói thành cấu trúc IPA
          cd AppHTML
          zip -r ../unsigned_app.ipa Payload

      - name: Upload IPA Output
        uses: actions/upload-artifact@v4
        with:
          name: my-html-app-ipa
          path: unsigned_app.ipa
